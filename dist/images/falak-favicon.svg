  <!-- Star dot -->
  <circle cx="42.5" cy="6" r="2" fill="#C6A769"/>
  <!-- Wedding rings -->
  <circle cx="26" cy="38" r="9" stroke="#C6A769" stroke-width="2.5" fill="none"/>
  <circle cx="38" cy="38" r="9" stroke="#C6A769" stroke-width="2.5" fill="none"/>
